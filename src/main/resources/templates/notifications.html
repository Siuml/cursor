<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{notification.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 th:text="#{notification.title}">Notifications</h4>
        <a th:href="@{/notifications/read-all}" class="btn btn-sm btn-outline-primary" th:text="#{notification.markAllRead}">Mark All Read</a>
    </div>

    <div th:if="${notifications != null and !notifications.isEmpty()}">
        <div class="list-group">
            <div th:each="notif : ${notifications}" class="list-group-item" th:classappend="${notif.isRead == 0} ? 'list-group-item-primary'">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <strong th:text="${#messages.msgOrNull(notif.title) ?: notif.title}">Title</strong>
                        <span class="badge ms-2" th:classappend="'bg-' + (${notif.type == 'order'} ? 'warning' : (${notif.type == 'comment'} ? 'info' : 'secondary'))" th:text="#{'notification.type.' + ${notif.type}}">Type</span>
                    </div>
                    <small class="text-muted" th:text="${#temporals.format(notif.createTime, 'yyyy-MM-dd HH:mm')}">Time</small>
                </div>
                <p class="mt-1 mb-0" th:if="${notif.content}" th:text="${notif.content}">Content</p>
                <a th:if="${notif.isRead == 0}" th:href="@{/notifications/read/{id}(id=${notif.id})}" class="btn btn-sm btn-link" th:text="#{notification.markRead}">Mark Read</a>
            </div>
        </div>
    </div>
    <div th:if="${notifications == null or notifications.isEmpty()}" class="text-center text-muted py-5">
        <p th:text="#{notification.empty}">No notifications</p>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/layout :: head(#{trade.detail.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div th:replace="~{fragments/layout :: alert-error}"></div>

    <div th:if="${order != null}">
        <div class="row mb-4">
            <div class="col">
                <h4 th:text="#{trade.detail.title}">交易详情</h4>
            </div>
            <div class="col text-end">
                <a th:href="@{/order/my}" class="btn btn-sm btn-outline-primary" th:text="#{admin.back}">返回订单列表</a>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white" th:text="#{trade.detail.orderinfo}">订单信息</div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong th:text="#{myorders.orderid}">订单编号：</strong>
                        <span th:text="${order.orderNo}">订单号</span>
                    </div>
                    <div class="col-md-6">
                        <strong th:text="#{myorders.status}">订单状态：</strong>
                        <span th:if="${order.status == 0}" class="badge bg-warning text-dark" th:text="#{myorders.status.pending}">待确认</span>
                        <span th:if="${order.status == 1}" class="badge bg-info" th:text="#{myorders.status.confirmed}">已确认</span>
                        <span th:if="${order.status == 4}" class="badge bg-primary" th:text="#{myorders.status.paid}">已付款</span>
                        <span th:if="${order.status == 2}" class="badge bg-success" th:text="#{myorders.status.completed}">已完成</span>
                        <span th:if="${order.status == 3}" class="badge bg-secondary" th:text="#{myorders.status.cancelled}">已取消</span>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong th:text="#{myorders.time}">下单时间：</strong>
                        <span th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}">时间</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4" th:if="${book != null}">
            <div class="card-header" th:text="#{trade.detail.bookinfo}">商品信息</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <img th:if="${book.coverImage}" th:src="${book.coverImage}" class="img-fluid rounded" alt="封面">
                        <div th:unless="${book.coverImage}" class="book-cover-placeholder detail d-flex align-items-center justify-content-center rounded">
                            <span class="text-muted" th:text="${book.title}">书名</span>
                        </div>
                    </div>
                    <div class="col-md-9">
                        <h5 th:text="${book.title}">书名</h5>
                        <p class="text-muted" th:text="#{book.author} + '：' + (${book.author} ?: #{book.detail.unknown})">作者：未知</p>
                        <p th:if="${book.isbn}" th:text="#{book.isbn} + '：' + ${book.isbn}">ISBN：</p>
                        <span th:if="${book.condition == 0}" class="badge bg-success me-2" th:text="#{book.condition.new}">全新</span>
                        <span th:if="${book.condition == 1}" class="badge bg-info me-2" th:text="#{book.condition.good}">良好</span>
                        <span th:if="${book.condition == 2}" class="badge bg-warning me-2" th:text="#{book.condition.fair}">一般</span>
                        <div class="mt-3">
                            <h4 class="price">₩<span th:text="${order.price}">0.00</span></h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4" th:if="${buyer != null && seller != null}">
            <div class="card-header" th:text="#{trade.detail.userinfo}">交易双方</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h5 th:text="#{myorders.buyer}">买家</h5>
                        <p th:text="${buyer.nickname}">买家昵称</p>
                        <p th:text="${buyer.phone ?: #{book.detail.unknown}}">联系方式</p>
                    </div>
                    <div class="col-md-6">
                        <h5 th:text="#{myorders.seller}">卖家</h5>
                        <p th:text="${seller.nickname}">卖家昵称</p>
                        <p th:text="${seller.phone ?: #{book.detail.unknown}}">联系方式</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" th:if="${order.status == 1 && loginUser != null && order.buyerId == loginUser.id}">
            <div class="card-body text-center">
                <a th:href="@{/order/payment/{id}(id=${order.id})}" class="btn btn-primary btn-lg" th:text="#{trade.detail.gotopay}">去付款</a>
            </div>
        </div>

        <div class="card" th:if="${order.status == 4 && loginUser != null && (order.buyerId == loginUser.id || order.sellerId == loginUser.id)}">
            <div class="card-body text-center">
                <a th:href="@{/order/complete/{id}(id=${order.id})}" class="btn btn-success btn-lg" th:text="#{myorders.complete}">确认完成</a>
            </div>
        </div>

        <div class="card" th:if="${order.status == 0 && loginUser != null && order.sellerId == loginUser.id}">
            <div class="card-body text-center">
                <a th:href="@{/order/confirm/{id}(id=${order.id})}" class="btn btn-primary btn-lg" th:text="#{myorders.confirm}">确认订单</a>
            </div>
        </div>

        <div class="card" th:if="${order.status == 0 && loginUser != null && (order.buyerId == loginUser.id || order.sellerId == loginUser.id)}">
            <div class="card-body text-center">
                <a th:href="@{/order/cancel/{id}(id=${order.id})}" class="btn btn-outline-danger" th:onclick="|return confirm('#{myorders.cancelconfirm}')|" th:text="#{myorders.cancel}">取消订单</a>
            </div>
        </div>
    </div>

    <div th:if="${order == null}" class="text-center text-muted py-5">
        <h4 th:text="#{trade.detail.notfound}">订单不存在</h4>
        <a th:href="@{/order/my}" class="btn btn-primary mt-3" th:text="#{admin.back}">返回订单列表</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

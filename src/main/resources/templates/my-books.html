<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{mybooks.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 th:text="#{mybooks.title}">My Books</h4>
        <a th:href="@{/book/publish}" class="btn btn-primary" th:text="#{mybooks.gopublish}">Publish New</a>
    </div>

    <div th:if="${books != null and !books.isEmpty()}">
        <table class="table table-hover">
            <thead><tr>
                <th th:text="#{book.title}">Title</th>
                <th th:text="#{book.author}">Author</th>
                <th th:text="#{book.price}">Price</th>
                <th th:text="#{book.condition}">Status</th>
                <th th:text="#{mybooks.time}">Time</th>
                <th th:text="#{mybooks.action}">Action</th>
            </tr></thead>
            <tbody><tr th:each="book : ${books}">
                <td th:text="${book.title}">Title</td>
                <td th:text="${book.author}">Author</td>
                <td><span th:text="#{common.currency} + ' ' + ${book.price}">$ 0.00</span></td>
                <td>
                    <span th:if="${book.status == 0}" class="badge bg-secondary" th:text="#{admin.off}">Off</span>
                    <span th:if="${book.status == 1}" class="badge bg-success" th:text="#{book.status}">On Sale</span>
                    <span th:if="${book.status == 2}" class="badge bg-warning" th:text="#{admin.sold}">Sold</span>
                </td>
                <td th:text="${#temporals.format(book.createTime, 'yyyy-MM-dd HH:mm')}">Time</td>
                <td>
                    <a th:href="@{/book/edit/{id}(id=${book.id})}" class="btn btn-sm btn-outline-primary" th:text="#{mybooks.edit}">Edit</a>
                    <a th:href="@{/book/off/{id}(id=${book.id})}" class="btn btn-sm btn-outline-warning" th:attr="onclick=|return confirm('#{common.confirm.off}')|" th:text="#{mybooks.off}">Off Shelf</a>
                </td>
            </tr></tbody>
        </table>
    </div>
    <div th:if="${books == null or books.isEmpty()}" class="text-muted text-center py-4">
        <p th:text="#{mybooks.noresult}">No books yet</p>
        <a th:href="@{/book/publish}" class="btn btn-primary" th:text="#{mybooks.gopublish}">Go Publish</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{register.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4" th:text="#{register.title}">Register</h4>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" method="post" id="registerForm">
                        <div class="mb-3">
                            <label class="form-label" th:text="#{register.username}">Username</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{register.password}">Password</label>
                            <input type="password" class="form-control" name="password" id="password" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{register.confirmPassword}">Confirm Password</label>
                            <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" required minlength="6">
                            <div class="invalid-feedback" id="passwordMismatch" style="display:none;" th:text="#{register.passwordMismatch}">Passwords do not match</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{register.nickname}">Nickname</label>
                            <input type="text" class="form-control" name="nickname" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{register.phone}">Phone (optional)</label>
                            <input type="text" class="form-control" name="phone">
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{register.button}">Register</button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        <span th:text="#{register.haveaccount}">Have account?</span> <a th:href="@{/login}" th:text="#{register.login}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        var pw = document.getElementById('password').value;
        var cpw = document.getElementById('confirmPassword').value;
        if (pw !== cpw) {
            e.preventDefault();
            document.getElementById('passwordMismatch').style.display = 'block';
            document.getElementById('confirmPassword').classList.add('is-invalid');
        }
    });
</script>
</body>
</html>

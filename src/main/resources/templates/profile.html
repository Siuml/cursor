<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{profile.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <h4 class="mb-3" th:text="#{profile.title}">My Profile</h4>

    <div class="card mb-4">
        <div class="card-header" th:text="#{profile.info}">Personal Info</div>
        <div class="card-body">
            <table class="table table-borderless">
                <tr><td width="120"><strong th:text="#{profile.username}">Username</strong></td><td th:text="${profileUser.username}">Username</td></tr>
                <tr><td><strong th:text="#{profile.nickname}">Nickname</strong></td><td th:text="${profileUser.nickname}">Nickname</td></tr>
                <tr><td><strong th:text="#{profile.phone}">Phone</strong></td><td th:text="${profileUser.phone}">Phone</td></tr>
                <tr><td><strong th:text="#{profile.role}">Role</strong></td><td th:text="${profileUser.role == 1 ? #{profile.admin} : #{profile.student}}">Role</td></tr>
                <tr><td><strong th:text="#{profile.registerTime}">Joined</strong></td><td th:text="${#temporals.format(profileUser.createTime, 'yyyy-MM-dd')}">Date</td></tr>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 th:text="#{profile.myBooks}">My Books</h5>
        <a th:href="@{/book/publish}" class="btn btn-primary" th:text="#{profile.publishNew}">Publish New</a>
    </div>

    <div th:if="${books != null and !books.isEmpty()}">
        <table class="table table-hover">
            <thead><tr>
                <th th:text="#{book.title}">Title</th>
                <th th:text="#{book.price}">Price</th>
                <th th:text="#{book.condition}">Status</th>
                <th th:text="#{mybooks.action}">Action</th>
            </tr></thead>
            <tbody><tr th:each="book : ${books}">
                <td th:text="${book.title}">Title</td>
                <td><span th:text="#{common.currency} + ' ' + ${book.price}">$ 0.00</span></td>
                <td>
                    <span th:if="${book.status == 0}" class="badge bg-secondary" th:text="#{admin.off}">Off</span>
                    <span th:if="${book.status == 1}" class="badge bg-success" th:text="#{book.status}">On Sale</span>
                    <span th:if="${book.status == 2}" class="badge bg-warning" th:text="#{admin.sold}">Sold</span>
                </td>
                <td>
                    <a th:href="@{/book/edit/{id}(id=${book.id})}" class="btn btn-sm btn-outline-primary" th:text="#{mybooks.edit}">Edit</a>
                    <a th:href="@{/book/off/{id}(id=${book.id})}" class="btn btn-sm btn-outline-warning" th:attr="onclick=|return confirm('#{common.confirm.off}')|" th:text="#{mybooks.off}">Off Shelf</a>
                </td>
            </tr></tbody>
        </table>
    </div>
    <div th:if="${books == null or books.isEmpty()}" class="text-muted text-center py-3">
        <p th:text="#{profile.noBooks}">No books yet</p>
        <a th:href="@{/book/publish}" class="btn btn-primary" th:text="#{profile.gopublish}">Go Publish</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

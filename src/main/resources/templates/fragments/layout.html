<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - ' + #{title}">二手书交易</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        function changeLanguage(lang) {
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.set('lang', lang);
            window.location.href = currentUrl.toString();
        }
    </script>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">📚 <span th:text="#{title}">二手书交易</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><span th:text="#{navbar.home}">首页</span></a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link" th:href="@{/book/publish}"><span th:text="#{navbar.publish}">发布书籍</span></a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link" th:href="@{/book/my}"><span th:text="#{navbar.mybooks}">我的发布</span></a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link" th:href="@{/order/my}"><span th:text="#{navbar.myorders}">我的订单</span></a>
                </li>
                <li class="nav-item" th:if="${loginUser != null and loginUser.role == 1}">
                    <a class="nav-link" th:href="@{/admin}"><span th:text="#{navbar.admin}">管理后台</span></a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="${#locale.language == 'en' ? 'Language' : (#locale.language == 'ko' ? '언어' : '语言')}">
                        语言
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" onclick="changeLanguage('zh_CN')">中文</a></li>
                        <li><a class="dropdown-item" href="#" onclick="changeLanguage('en_US')">English</a></li>
                        <li><a class="dropdown-item" href="#" onclick="changeLanguage('ko_KR')">한국어</a></li>
                    </ul>
                </li>
                <li class="nav-item" th:if="${loginUser == null}">
                    <a class="nav-link" th:href="@{/login}"><span th:text="#{navbar.login}">登录</span></a>
                </li>
                <li class="nav-item" th:if="${loginUser == null}">
                    <a class="nav-link" th:href="@{/register}"><span th:text="#{navbar.register}">注册</span></a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <span class="nav-link text-light"><span th:text="#{navbar.greeting(${loginUser.nickname})}">你好，用户</span></span>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link" th:href="@{/logout}"><span th:text="#{navbar.logout}">退出</span></a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="alert" th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:fragment="alert-error" th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<script th:fragment="scripts" th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>

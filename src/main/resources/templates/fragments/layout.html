<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - ' + #{title}">BookTrade</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        function changeLanguage(lang) {
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.set('lang', lang);
            window.location.href = currentUrl.toString();
        }
    </script>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">&#128218; <span th:text="#{title}">BookTrade</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:text="#{navbar.home}">Home</a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link" th:href="@{/book/publish}" th:text="#{navbar.publish}">Publish</a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link" th:href="@{/profile}" th:text="#{navbar.profile}">My Profile</a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link" th:href="@{/order/my}" th:text="#{navbar.myorders}">My Orders</a>
                </li>
                <li class="nav-item" th:if="${loginUser != null and loginUser.role == 1}">
                    <a class="nav-link" th:href="@{/admin}" th:text="#{navbar.admin}">Admin</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="${#messages.msg('language.' + #locale.language)}">Language</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" onclick="changeLanguage('zh_CN')" th:text="#{language.zh}">涓枃</a></li>
                        <li><a class="dropdown-item" href="#" onclick="changeLanguage('en_US')" th:text="#{language.en}">English</a></li>
                        <li><a class="dropdown-item" href="#" onclick="changeLanguage('ko_KR')" th:text="#{language.ko}">???</a></li>
                    </ul>
                </li>
                <li class="nav-item" th:if="${loginUser == null}">
                    <a class="nav-link" th:href="@{/login}" th:text="#{navbar.login}">Login</a>
                </li>
                <li class="nav-item" th:if="${loginUser == null}">
                    <a class="nav-link" th:href="@{/register}" th:text="#{navbar.register}">Register</a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link position-relative" th:href="@{/notifications}">
                        &#128276;
                        <span th:if="${unreadCount != null and unreadCount > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              style="font-size:0.6rem;"
                              th:text="${unreadCount > 99 ? '99+' : unreadCount}">0</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <span class="nav-link text-light" th:text="#{navbar.greeting(${loginUser.nickname})}">Hi, User</span>
                </li>
                <li class="nav-item" th:if="${loginUser != null}">
                    <a class="nav-link" th:href="@{/logout}" th:text="#{navbar.logout}">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="alert" th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${#messages.msgOrNull(success) ?: success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:fragment="alert-error" th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${#messages.msgOrNull(error) ?: error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<script th:fragment="scripts" th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>

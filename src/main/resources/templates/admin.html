<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/layout :: head(#{admin.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <h4 class="mb-4" th:text="#{admin.title}">管理后台</h4>

    <h5 class="mb-3" th:text="#{admin.books}">全部书籍</h5>
    <div class="table-responsive mb-5">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{book.title}">书名</th>
                <th th:text="#{book.price}">价格</th>
                <th th:text="#{admin.sellerid}">卖家ID</th>
                <th th:text="#{book.condition}">状态</th>
                <th th:text="#{admin.action}">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}">ID</td>
                <td th:text="${book.title}">书名</td>
                <td>₩<span th:text="${book.price}">0.00</span></td>
                <td th:text="${book.sellerId}">卖家</td>
                <td>
                    <span th:if="${book.status == 0}" class="badge bg-secondary" th:text="#{admin.off}">已下架</span>
                    <span th:if="${book.status == 1}" class="badge bg-success" th:text="#{book.status}">在售</span>
                    <span th:if="${book.status == 2}" class="badge bg-warning text-dark" th:text="#{admin.sold}">已售</span>
                </td>
                <td>
                    <a th:href="@{/admin/book/delete/{id}(id=${book.id})}"
                       class="btn btn-sm btn-outline-danger"
                       th:onclick="|return confirm('#{admin.deleteconfirm}')|" th:text="#{admin.delete}">删除</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <h5 class="mb-3" th:text="#{admin.orders}">全部订单</h5>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th th:text="#{myorders.orderid}">订单号</th>
                <th th:text="#{book.title}">书籍ID</th>
                <th th:text="#{myorders.buyer}">买家ID</th>
                <th th:text="#{myorders.seller}">卖家ID</th>
                <th th:text="#{myorders.amount}">价格</th>
                <th th:text="#{myorders.status}">状态</th>
                <th th:text="#{admin.time}">下单时间</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.orderNo}">订单号</td>
                <td th:text="${order.bookId}">书籍</td>
                <td th:text="${order.buyerId}">买家</td>
                <td th:text="${order.sellerId}">卖家</td>
                <td>₩<span th:text="${order.price}">0.00</span></td>
                <td>
                    <span th:if="${order.status == 0}" class="badge bg-warning text-dark" th:text="#{myorders.status.pending}">待确认</span>
                    <span th:if="${order.status == 1}" class="badge bg-info" th:text="#{myorders.status.confirmed}">已确认</span>
                    <span th:if="${order.status == 2}" class="badge bg-success" th:text="#{myorders.status.completed}">已完成</span>
                    <span th:if="${order.status == 3}" class="badge bg-secondary" th:text="#{myorders.status.cancelled}">已取消</span>
                </td>
                <td th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}">时间</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

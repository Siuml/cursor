<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{admin.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <h4 class="mb-4" th:text="#{admin.title}">Admin Panel</h4>

    <div class="card mb-4">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0" th:text="#{admin.broadcast}">Broadcast</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/broadcast}" method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{admin.broadcast.title}">Title</label>
                    <input type="text" class="form-control" name="title" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{admin.broadcast.content}">Content</label>
                    <textarea class="form-control" name="content" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-warning" th:text="#{admin.broadcast.send}">Send to All Users</button>
            </form>
        </div>
    </div>

    <h5 class="mb-3" th:text="#{admin.books}">All Books</h5>
    <div class="table-responsive mb-5">
        <table class="table table-hover">
            <thead><tr>
                <th>ID</th><th th:text="#{book.title}">Title</th><th th:text="#{book.price}">Price</th>
                <th th:text="#{admin.sellerid}">Seller ID</th><th th:text="#{book.condition}">Status</th><th th:text="#{admin.action}">Action</th>
            </tr></thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}">ID</td><td th:text="${book.title}">Title</td>
                <td><span th:text="#{common.currency} + ' ' + ${book.price}">$ 0.00</span></td>
                <td th:text="${book.sellerId}">Seller</td>
                <td>
                    <span th:if="${book.status == 0}" class="badge bg-secondary" th:text="#{admin.off}">Off</span>
                    <span th:if="${book.status == 1}" class="badge bg-success" th:text="#{book.status}">On Sale</span>
                    <span th:if="${book.status == 2}" class="badge bg-warning text-dark" th:text="#{admin.sold}">Sold</span>
                </td>
                <td>
                    <a th:href="@{/admin/book/delete/{id}(id=${book.id})}" class="btn btn-sm btn-outline-danger" th:attr="onclick=|return confirm('#{common.confirm.delete}')|" th:text="#{admin.delete}">Delete</a>
                </td>
            </tr></tbody>
        </table>
    </div>

    <h5 class="mb-3" th:text="#{admin.orders}">All Orders</h5>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th th:text="#{myorders.orderid}">Order No.</th><th th:text="#{myorders.bookname}">Book</th>
                <th th:text="#{myorders.buyer}">Buyer</th><th th:text="#{myorders.seller}">Seller</th>
                <th th:text="#{myorders.amount}">Amount</th><th th:text="#{myorders.status}">Status</th><th th:text="#{admin.time}">Order Time</th>
            </tr></thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.orderNo}">Order No.</td><td th:text="${order.bookId}">Book</td>
                <td th:text="${order.buyerId}">Buyer</td><td th:text="${order.sellerId}">Seller</td>
                <td><span th:text="#{common.currency} + ' ' + ${order.price}">$ 0.00</span></td>
                <td>
                    <span th:if="${order.status == 0}" class="badge bg-warning text-dark" th:text="#{myorders.status.pending}">Pending</span>
                    <span th:if="${order.status == 1}" class="badge bg-info" th:text="#{myorders.status.confirmed}">Confirmed</span>
                    <span th:if="${order.status == 2}" class="badge bg-success" th:text="#{myorders.status.completed}">Completed</span>
                    <span th:if="${order.status == 3}" class="badge bg-secondary" th:text="#{myorders.status.cancelled}">Cancelled</span>
                </td>
                <td th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}">Time</td>
            </tr></tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

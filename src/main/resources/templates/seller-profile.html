<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{seller.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <h4 class="mb-2" th:text="${seller.nickname}">Seller</h4>
    <p class="text-muted"><span th:text="#{seller.memberSince}">Member Since</span><span th:text="#{common.colon}">: </span><span th:text="${#temporals.format(seller.createTime, 'yyyy-MM-dd')}">Date</span></p>

    <h5 class="mt-4 mb-3" th:text="#{seller.books(${seller.nickname})}">Books</h5>

    <div class="row" th:if="${books != null and !books.isEmpty()}">
        <div class="col-md-4 mb-4" th:each="book : ${books}">
            <div class="card book-card h-100">
                <img th:if="${book.coverImage}" th:src="${book.coverImage}" class="card-img-top book-cover" th:alt="#{seller.coverAlt}">
                <div th:unless="${book.coverImage}" class="card-img-top book-cover-placeholder d-flex align-items-center justify-content-center">
                    <span class="text-muted" th:text="${book.title}">Title</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${book.title}">Title</h5>
                    <p class="card-text text-muted" th:text="${book.author}">Author</p>
                    <p class="card-text price"><span th:text="#{common.currency}">$</span><span th:text="${book.price}">0.00</span></p>
                    <a th:href="@{/book/detail/{id}(id=${book.id})}" class="btn btn-outline-primary btn-sm" th:text="#{index.viewdetail}">View</a>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${books == null or books.isEmpty()}" class="text-muted text-center py-4">
        <p th:text="#{seller.noBooks}">No books</p>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{payment.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:if="${order != null}">
        <h4 class="mb-3" th:text="#{payment.title}">Confirm Payment</h4>
        <div class="card mb-3">
            <div class="card-body">
                <p><span th:text="#{payment.orderno}">Order No.</span><span th:text="#{common.colon}">: </span><span th:text="${order.orderNo}">Order No.</span></p>
                <p><span th:text="#{payment.amount}">Amount</span><span th:text="#{common.colon}">: </span><strong><span th:text="#{common.currency}">$</span><span th:text="${order.price}">0.00</span></strong></p>
            </div>
        </div>

        <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
            <div class="card mb-3">
                <div class="card-header" th:text="#{payment.method}">Payment Method</div>
                <div class="card-body">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="payMethod" value="card" id="payCard" checked>
                        <label class="form-check-label" for="payCard" th:text="#{payment.method.card}">Credit Card</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="payMethod" value="bank" id="payBank">
                        <label class="form-check-label" for="payBank" th:text="#{payment.method.bank}">Bank Transfer</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="payMethod" value="wallet" id="payWallet">
                        <label class="form-check-label" for="payWallet" th:text="#{payment.method.wallet}">E-Wallet</label>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100" th:text="#{payment.submit}">Confirm Payment</button>
            <p class="text-muted mt-2 text-center" th:text="#{payment.note}">Note</p>
        </form>
    </div>
    <div th:if="${order == null}" class="text-center py-5">
        <p class="text-muted" th:text="#{payment.notfound}">Order not found</p>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

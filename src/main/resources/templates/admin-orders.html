<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{admin.orders.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 th:text="#{admin.orders.title}">Order Management</h4>
        <a th:href="@{/admin}" class="btn btn-sm btn-secondary" th:text="#{admin.back}">Back</a>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/orders}" method="get" class="row g-3">
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="" th:text="#{admin.all}">All</option>
                        <option value="0" th:text="#{myorders.status.pending}">Pending</option>
                        <option value="1" th:text="#{myorders.status.confirmed}">Confirmed</option>
                        <option value="4" th:text="#{myorders.status.paid}">Paid</option>
                        <option value="2" th:text="#{myorders.status.completed}">Completed</option>
                        <option value="3" th:text="#{myorders.status.cancelled}">Cancelled</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control" name="startDate" th:placeholder="#{admin.startdate}">
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control" name="endDate" th:placeholder="#{admin.enddate}">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100" th:text="#{admin.search}">Search</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${orders != null and !orders.isEmpty()}" class="table-responsive">
        <table class="table table-hover">
            <thead><tr>
                <th th:text="#{myorders.orderid}">Order No.</th>
                <th th:text="#{myorders.buyer}">Buyer</th>
                <th th:text="#{myorders.seller}">Seller</th>
                <th th:text="#{myorders.amount}">Amount</th>
                <th th:text="#{myorders.status}">Status</th>
                <th th:text="#{admin.time}">Order Time</th>
                <th th:text="#{admin.action}">Action</th>
            </tr></thead>
            <tbody><tr th:each="order : ${orders}">
                <td th:text="${order.orderNo}">Order No.</td>
                <td th:text="${order.buyerId}">Buyer</td>
                <td th:text="${order.sellerId}">Seller</td>
                <td><span th:text="#{common.currency} + ' ' + ${order.price}">$ 0.00</span></td>
                <td>
                    <span th:if="${order.status == 0}" class="badge bg-warning text-dark" th:text="#{myorders.status.pending}">Pending</span>
                    <span th:if="${order.status == 1}" class="badge bg-info" th:text="#{myorders.status.confirmed}">Confirmed</span>
                    <span th:if="${order.status == 4}" class="badge bg-primary" th:text="#{myorders.status.paid}">Paid</span>
                    <span th:if="${order.status == 2}" class="badge bg-success" th:text="#{myorders.status.completed}">Completed</span>
                    <span th:if="${order.status == 3}" class="badge bg-secondary" th:text="#{myorders.status.cancelled}">Cancelled</span>
                </td>
                <td th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}">Time</td>
                <td><a th:href="@{/admin/order/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary" th:text="#{admin.detail}">Detail</a></td>
            </tr></tbody>
        </table>
    </div>
    <div th:if="${orders == null or orders.isEmpty()}" class="text-center text-muted py-4">
        <p th:text="#{admin.noorders}">No orders</p>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{login.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4" th:text="#{login.title}">Login</h4>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label" th:text="#{login.username}">Username</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{login.password}">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{login.button}">Login</button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        <span th:text="#{login.noaccount}">No account?</span> <a th:href="@{/register}" th:text="#{login.register}">Register</a>
                    </p>
                    <p class="text-center text-muted small mt-2" th:text="#{login.testaccount}">Test account</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

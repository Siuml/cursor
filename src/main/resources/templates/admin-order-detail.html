<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/layout :: head(#{admin.order.detail})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div th:replace="~{fragments/layout :: alert-error}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 th:text="#{admin.order.detail}">订单详情</h4>
        <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-primary" th:text="#{admin.back}">返回订单列表</a>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white" th:text="#{myorders.orderinfo}">订单信息</div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong th:text="#{myorders.orderid}">订单号：</strong>
                            <span th:text="${order.orderNo}">ORD000000</span>
                        </div>
                        <div class="col-md-6">
                            <strong th:text="#{myorders.status}">订单状态：</strong>
                            <span th:if="${order.status == 0}" class="badge bg-warning text-dark" th:text="#{myorders.status.pending}">待确认</span>
                            <span th:if="${order.status == 1}" class="badge bg-info" th:text="#{myorders.status.confirmed}">已确认</span>
                            <span th:if="${order.status == 4}" class="badge bg-primary" th:text="#{myorders.status.paid}">已付款</span>
                            <span th:if="${order.status == 2}" class="badge bg-success" th:text="#{myorders.status.completed}">已完成</span>
                            <span th:if="${order.status == 3}" class="badge bg-secondary" th:text="#{myorders.status.cancelled}">已取消</span>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong th:text="#{myorders.time}">下单时间：</strong>
                            <span th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}">时间</span>
                        </div>
                        <div class="col-md-6">
                            <strong th:text="#{myorders.amount}">交易金额：</strong>
                            <span class="text-primary fw-bold">₩<span th:text="${order.price}">0.00</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-primary text-white" th:text="#{book.title}">商品详情</div>
                <div class="card-body">
                    <div th:if="${book != null}">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <img th:if="${book.coverImage != null}" th:src="@{/uploads/{image}(image=${book.coverImage})}" 
                                     class="img-fluid rounded" alt="书籍封面">
                                <div th:else class="bg-light rounded p-4 text-center text-muted">无封面图片</div>
                            </div>
                            <div class="col-md-8">
                                <h5 th:text="${book.title}">书名</h5>
                                <p class="text-muted" th:text="${book.author}">作者</p>
                                <p class="text-muted" th:text="${book.description}">描述</p>
                                <div class="mt-2">
                                    <span class="badge bg-secondary" th:text="#{book.category}">分类</span>
                                    <span th:text="${#messages.msg('category.' + book.categoryId)}">分类名称</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:else class="text-muted text-center py-4" th:text="#{book.detail.unknown}">商品信息不存在</div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-primary text-white" th:text="#{admin.order.logs}">操作日志</div>
                <div class="card-body">
                    <div th:if="${logs != null and !logs.isEmpty()}">
                        <div class="list-group">
                            <div th:each="log : ${logs}" class="list-group-item">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <strong th:text="${log.action}">操作内容</strong>
                                        <p class="text-muted small mt-1" th:if="${log.operatorName != null}">
                                            <span th:text="#{admin.operator}">操作人：</span>
                                            <span th:text="${log.operatorName}">管理员</span>
                                        </p>
                                        <p class="text-muted small mt-1" th:if="${log.operatorName == null}">
                                            <span th:text="#{admin.system}">系统操作</span>
                                        </p>
                                    </div>
                                    <span class="text-muted small" th:text="${#temporals.format(log.createTime, 'yyyy-MM-dd HH:mm:ss')}">时间</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:else class="text-muted text-center py-4" th:text="#{admin.nologs}">暂无操作记录</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white" th:text="#{myorders.buyer}">买家信息</div>
                <div class="card-body">
                    <div th:if="${buyer != null}">
                        <p><strong>用户名：</strong><span th:text="${buyer.username}">用户名</span></p>
                        <p><strong>昵称：</strong><span th:text="${buyer.nickname}">昵称</span></p>
                        <p><strong>手机号：</strong><span th:text="${buyer.phone != null ? buyer.phone : '-'}">-</span></p>
                    </div>
                    <div th:else class="text-muted">用户信息不存在</div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-primary text-white" th:text="#{myorders.seller}">卖家信息</div>
                <div class="card-body">
                    <div th:if="${seller != null}">
                        <p><strong>用户名：</strong><span th:text="${seller.username}">用户名</span></p>
                        <p><strong>昵称：</strong><span th:text="${seller.nickname}">昵称</span></p>
                        <p><strong>手机号：</strong><span th:text="${seller.phone != null ? seller.phone : '-'}">-</span></p>
                    </div>
                    <div th:else class="text-muted">用户信息不存在</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-primary text-white" th:text="#{admin.action}">操作</div>
                <div class="card-body">
                    <div th:if="${order.status == 0}">
                        <a th:href="@{/admin/order/confirm/{id}(id=${order.id})}" 
                           class="btn btn-sm btn-primary w-100 mb-2"
                           th:onclick="|return confirm('#{admin.order.confirmconfirm}')|"
                           th:text="#{myorders.confirm}">确认订单</a>
                        <a th:href="@{/admin/order/cancel/{id}(id=${order.id})}" 
                           class="btn btn-sm btn-outline-danger w-100"
                           th:onclick="|return confirm('#{myorders.cancelconfirm}')|"
                           th:text="#{myorders.cancel}">取消订单</a>
                    </div>
                    <div th:if="${order.status == 1}">
                        <a th:href="@{/admin/order/complete/{id}(id=${order.id})}" 
                           class="btn btn-sm btn-success w-100"
                           th:onclick="|return confirm('#{admin.order.completeconfirm}')|"
                           th:text="#{myorders.complete}">确认完成</a>
                    </div>
                    <div th:if="${order.status == 4}">
                        <a th:href="@{/admin/order/complete/{id}(id=${order.id})}" 
                           class="btn btn-sm btn-success w-100"
                           th:onclick="|return confirm('#{admin.order.completeconfirm}')|"
                           th:text="#{myorders.complete}">确认完成</a>
                    </div>
                    <div th:if="${order.status == 2}" class="text-center text-success" th:text="#{myorders.status.completed}">订单已完成</div>
                    <div th:if="${order.status == 3}" class="text-center text-secondary" th:text="#{myorders.status.cancelled}">订单已取消</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

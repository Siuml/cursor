<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language == 'en' ? 'en' : (#locale.language == 'ko' ? 'ko' : 'zh-CN')}">
<head th:replace="~{fragments/layout :: head(#{index.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div th:replace="~{fragments/layout :: alert-error}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/}" method="get" class="row g-3">
                <div class="col-md-5">
                    <input type="text" class="form-control" name="keyword"
                           th:placeholder="#{index.search}"
                           th:value="${keyword}">
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="categoryId">
                        <option value="" th:text="#{index.category}">All Categories</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${#messages.msg('category.' + cat.id)}"
                                th:selected="${categoryId != null and categoryId == cat.id}">
                        </option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100" th:text="#{index.searchbutton}">Search</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row" th:if="${books != null and !books.isEmpty()}">
        <div class="col-md-4 mb-4" th:each="book : ${books}">
            <div class="card book-card h-100">
                <img th:if="${book.coverImage}" th:src="${book.coverImage}" class="card-img-top book-cover" th:alt="#{common.image.alt}">
                <div th:unless="${book.coverImage}" class="card-img-top book-cover-placeholder d-flex align-items-center justify-content-center">
                    <span class="text-muted" th:text="${book.title}">Title</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${book.title}">Title</h5>
                    <p class="card-text text-muted" th:text="${book.author}">Author</p>
                    <p class="card-text price"><span th:text="#{common.currency}">$</span><span th:text="${book.price}">0.00</span></p>
                    <span th:if="${book.condition == 0}" class="badge bg-success me-1" th:text="#{book.condition.new}">New</span>
                    <span th:if="${book.condition == 1}" class="badge bg-info me-1" th:text="#{book.condition.good}">Good</span>
                    <span th:if="${book.condition == 2}" class="badge bg-warning me-1" th:text="#{book.condition.fair}">Fair</span>
                    <a th:href="@{/book/detail/{id}(id=${book.id})}" class="btn btn-outline-primary btn-sm d-block mt-2" th:text="#{index.viewdetail}">View Details</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${books == null or books.isEmpty()}" class="text-center text-muted py-5">
        <p th:text="#{index.noresult}">No books available</p>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

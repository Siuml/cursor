server:
  port: ${PORT:8080}

spring:
  application:
    name: book-trade
  datasource:
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    url: ${DB_URL:jdbc:h2:mem:booktrade;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: ${H2_CONSOLE:true}
      path: /h2-console
  sql:
    init:
      mode: ${SQL_INIT:always}
      continue-on-error: true
      schema-locations: classpath:${SCHEMA_FILE:schema-h2.sql}
      data-locations: classpath:${DATA_FILE:data-h2.sql}
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  messages:
    basename: i18n/messages
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

book-trade:
  upload-path: ${UPLOAD_PATH:uploads/}